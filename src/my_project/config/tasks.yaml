analyze_user_task:
  description: >
    1. Use the {user_id} to query 'review_subset.json'.
    2. Focus ONLY on reviews for businesses OTHER than {item_id}. 
    3. Determine the user's "Baseline": Do they usually give 5 stars to everything, or are they a tough critic?
    4. Identify their "Style": Do they write one-sentence reviews or long essays?
  expected_output: >
    A detailed Markdown User Persona report summarizing the consumer's 
    preferences and historical rating bias.
  agent: user_profiler

analyze_item_task:
  description: >
    1. Use the {item_id} to query 'item_subset.json' and 'review_subset.json'.
    2. Identify the business's key characteristics: signature dishes, service quality, 
       price range, and common complaints.
    3. Look for "latent features" in existing reviews that define this business's 'vibe'.
  expected_output: >
    A detailed Markdown Business Evaluation report highlighting the 
    strengths and weaknesses of the entity.
  agent: item_analyst

predict_review_task:
  description: >
    1. Receive the Researcher's report on User {user_id} and Business {item_id}.
    2. Review the Business's actual attributes (e.g., "Pho," "Quick service," "Clean restrooms").
    3. Review the User's behavior (e.g., "Always mentions the price," "Values cleanliness").
    4. COMBINE THEM: Write a review that discusses the ACTUAL features of the business through the ACTUAL lens of the user.
    5. Ensure the "stars" matches the user's historical bias (e.g., if they are a harsh critic, a good experience might only be a 4.0, not a 5.0).
  expected_output: >
    A JSON object containing ONLY the following fields at the root level:
    "stars": (float),
    "review": (string).
    Do not wrap the result in a parent key like 'YelpPrediction' or 'output'.
  agent: prediction_modeler
  context: [analyze_user_task, analyze_item_task]